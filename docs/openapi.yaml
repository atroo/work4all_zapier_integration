openapi: 3.0.3

info:
  title: work4all API — Zapier Integration
  description: |
    This document describes the operations available in the **work4all Zapier integration**.

    ## Authentication

    The integration uses **OAuth2 Client Credentials**. You need:
    - **API URL** — base URL of your work4all instance (e.g. `https://api.work4all.de`)
    - **Token URL** — OAuth2 token endpoint (e.g. `https://api.work4all.de/api/OAuth2/token`)
    - **Client ID** — provided by work4all
    - **Client Secret** — provided by work4all

    ## Operations

    | Type   | Name               | Description                              |
    |--------|--------------------|------------------------------------------|
    | Action | Create Invoice     | Creates a complete incoming invoice      |
    | Action | Create Customer    | Creates a new customer                   |
    | Action | Update Customer    | Updates an existing customer             |
    | Search | Find Customer      | Finds a single customer by code          |
    | Search | Find Customers     | Returns a paginated list of customers    |
    | Search | Find Project       | Finds a single project by code           |
    | Search | Find Projects      | Returns a paginated list of projects     |

  version: "1.0.0"
  contact:
    name: work4all Support
    email: support@work4all.de
    url: https://work4all.de

servers:
  - url: https://api.work4all.de
    description: Production

components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /api/OAuth2/token
          scopes: {}

  schemas:

    Invoice:
      type: object
      properties:
        code:
          type: integer
          description: Unique internal invoice code.
          example: 1582980996
        rNummer:
          type: integer
          description: Sequential invoice number assigned by work4all.
          example: 250291
        rNummerbeiLieferant:
          type: string
          description: The supplier's own invoice number.
          example: "INV-2026-001"
        datum:
          type: string
          format: date-time
          description: Invoice date.
        eingangsDatum:
          type: string
          format: date-time
          description: Receipt date.
        faelligDatum:
          type: string
          format: date-time
          description: Due date.
        buchungsDatum:
          type: string
          format: date-time
          description: Posting date.
        notiz:
          type: string
          description: Internal note.
        sDObjMemberCode:
          type: integer
          description: Internal code of the linked supplier.
        projektCode:
          type: integer
          description: Internal code of the linked project.
        rBetrag:
          type: number
          description: Invoice gross amount.
        rMwst:
          type: number
          description: VAT amount.
        summe:
          type: number
          description: Total sum.
        waehrungCode:
          type: integer
          description: Currency code (1 = EUR).
        paymentTermDays:
          type: integer
          description: Payment term in days.
        skontoProzent:
          type: number
          description: Discount 1 rate (%).
        skontoTg:
          type: integer
          description: Discount 1 days.
        statusCode:
          type: integer
          description: Invoice status code.
        creationDate:
          type: string
          format: date-time
          description: Timestamp when the invoice was created in work4all.
        lieferant:
          type: object
          properties:
            code: { type: integer }
            nummer: { type: integer }
            name: { type: string }
        projekt:
          type: object
          nullable: true
          properties:
            code: { type: integer }
            nummer: { type: string }
            name: { type: string }
        buchungen:
          type: array
          description: Invoice line items.
          items:
            type: object
            properties:
              code: { type: integer }
              sachkontoCode: { type: integer, description: "Account code." }
              sachkontoNummer: { type: string, description: "Account number." }
              kostenstelleCode: { type: integer, description: "Cost center code." }
              kostenstelleNummer: { type: string, description: "Cost center number." }
              kostengruppeCode: { type: integer, description: "Cost group code." }
              projektCode: { type: integer }
              steuerschluessel: { type: integer, description: "Tax key." }
              mwst: { type: number, description: "Tax rate (%)." }
              valueNet: { type: number, description: "Net amount." }
              mwstBetrag: { type: number, description: "VAT amount." }
              anteilDM: { type: number, description: "Gross amount." }
              notiz: { type: string }

    InvoiceInput:
      type: object
      description: |
        All fields are optional except that at least one supplier identifier must be provided.
        You can either provide a complete JSON object in `invoiceDataJson` (ideal for LLM output),
        or fill each field individually.
      properties:
        invoiceDataJson:
          type: string
          description: |
            Complete invoice data as a JSON object. When provided, all individual fields below
            are ignored. Field names use camelCase. Example:
            `{"supplierCode":123,"invoiceNumberSupplier":"INV-001","invoiceDate":"2026-01-15T00:00:00Z","invoiceItems":[{"account":4500,"taxRate":19,"netAmount":100,"grossAmount":119,"vatAmount":19}]}`
        supplierCode:
          type: integer
          description: Internal work4all supplier code. Takes priority over all other supplier lookup fields.
        supplierName:
          type: string
          description: Look up supplier by name. Match must be unique.
        supplierCustomerNumberAtSupplier:
          type: string
          description: Your own customer number at this supplier. Match must be unique.
        supplierContactMailAddress:
          type: string
          description: Email address of the supplier or one of their contacts. Match must be unique.
        supplierIban:
          type: string
          description: IBAN of the supplier. Match must be unique.
        invoiceNumberSupplier:
          type: string
          description: The supplier's own invoice number.
        note:
          type: string
          description: Internal note for the invoice.
        invoiceDate:
          type: string
          format: date-time
        entryDate:
          type: string
          format: date-time
        receiptDate:
          type: string
          format: date-time
        projectCode:
          type: integer
          description: Internal project code. Takes priority over project number and name.
        projectNumber:
          type: string
          description: Human-readable project number. Match must be unique.
        projectName:
          type: string
          description: Project name. Match must be unique.
        paymentTermDays:
          type: integer
        discount1Days:
          type: integer
        discount1Rate:
          type: number
        discount2Days:
          type: integer
        discount2Rate:
          type: number
        currencyCode:
          type: integer
          description: Internal currency code (e.g. 1 for EUR).
        invoiceItems:
          type: array
          description: List of invoice line items.
          items:
            type: object
            properties:
              account: { type: integer }
              costCenter: { type: integer }
              costGroup: { type: integer }
              projectCode: { type: integer }
              taxCode: { type: integer }
              taxRate: { type: number }
              netAmount: { type: number }
              grossAmount: { type: number }
              vatAmount: { type: number }
              note: { type: string }
        receiptFileUrls:
          type: array
          items:
            type: string
            format: uri
          description: |
            URLs of files to attach (PDF, XML, ZIP). Each file is automatically downloaded
            and uploaded to work4all as a receipt attachment. ZIP archives are extracted
            and each contained file is uploaded individually.

    Customer:
      type: object
      properties:
        code:
          type: integer
          description: Unique internal customer code.
          example: 123456789
        nummer:
          type: integer
          description: Human-readable customer number.
          example: 1001
        name:
          type: string
          description: Full display name (typically company name + city).
          example: "Acme GmbH, Berlin"
        eMail:
          type: string
          example: "info@acme.de"
        telefon:
          type: string
          example: "+49 30 123456"
        strasse:
          type: string
          description: Street address.
        plz:
          type: string
          description: Postal code.
        ort:
          type: string
          description: City.
        notiz:
          type: string
          description: Internal note.
        interNet:
          type: string
          description: Website URL.
        privatkunde:
          type: boolean
          description: True if this is a private (non-business) customer.
        gesperrt:
          type: boolean
          description: True if the customer account is blocked.
        zahlungsfrist:
          type: integer
          description: Default payment term in days.
        gruppe:
          type: object
          nullable: true
          properties:
            code: { type: integer }
            name: { type: string }

    CustomerInput:
      type: object
      properties:
        firma1:
          type: string
          description: Legal company name. Required when creating a customer.
          example: "Acme GmbH"
        eMail:
          type: string
          description: Primary email address.
        telefon:
          type: string
          description: Primary phone number.
        strasse:
          type: string
          description: Street address including house number.
        plz:
          type: string
          description: Postal / ZIP code.
        ort:
          type: string
          description: City or town name.
        interNet:
          type: string
          description: Company website URL.
        notiz:
          type: string
          description: Internal note about this customer.

    Project:
      type: object
      properties:
        id:
          type: integer
          description: Unique internal project code.
          example: 1610906012
        name:
          type: string
          example: "Website Relaunch"
        number:
          type: string
          description: Human-readable project number.
          example: "P-2026-001"
        startDateInner:
          type: string
          format: date-time
          description: Planned start date (inner).
        startDateOuter:
          type: string
          format: date-time
          description: Contractual start date (outer).
        endDateInner:
          type: string
          format: date-time
          description: Planned end date (inner).
        endDateOuter:
          type: string
          format: date-time
          description: Contractual end date (outer).
        customerId:
          type: integer
          description: Internal code of the linked customer.
        customer:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            number: { type: integer }
        supplierId:
          type: integer
          nullable: true
          description: Internal code of the linked supplier.

    PaginatedCustomers:
      type: object
      properties:
        total:
          type: integer
          description: Total number of matching customers.
        size:
          type: integer
          description: Number of results returned on this page.
        page:
          type: integer
          description: Current page number (1-based).
        data:
          type: array
          items:
            $ref: "#/components/schemas/Customer"

    PaginatedProjects:
      type: object
      properties:
        total:
          type: integer
          description: Total number of matching projects.
        size:
          type: integer
          description: Number of results returned on this page.
        page:
          type: integer
          description: Current page number (1-based).
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"

security:
  - oauth2: []

tags:
  - name: Invoices
    description: Create and manage incoming invoices.
  - name: Customers
    description: Create, update, and search customers.
  - name: Projects
    description: Search projects.

paths:

  /invoices:
    post:
      operationId: createInvoice
      summary: Create Invoice
      description: |
        Creates a complete incoming invoice in work4all.

        You can identify the supplier by code, name, email, IBAN, or customer number —
        the server resolves them in that priority order.

        **JSON mode (recommended for LLM output):** provide all data in the `invoiceDataJson`
        field as a single JSON object and leave all other fields empty.

        **Form fields mode:** fill each field individually.
      tags:
        - Invoices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
            examples:
              jsonMode:
                summary: JSON mode — full invoice with line item
                value:
                  invoiceDataJson: |
                    {
                      "supplierCode": 1245558295,
                      "invoiceNumberSupplier": "INV-2026-001",
                      "invoiceDate": "2026-01-15T00:00:00Z",
                      "entryDate": "2026-01-15T00:00:00Z",
                      "paymentTermDays": 30,
                      "discount1Rate": 2,
                      "discount1Days": 10,
                      "currencyCode": 1,
                      "note": "Q1 services",
                      "invoiceItems": [
                        {
                          "account": 4500,
                          "taxRate": 19,
                          "netAmount": 100.00,
                          "grossAmount": 119.00,
                          "vatAmount": 19.00,
                          "note": "Consulting"
                        }
                      ]
                    }
              formMode:
                summary: Form fields mode — supplier lookup by name
                value:
                  supplierName: "Acme GmbH"
                  invoiceNumberSupplier: "INV-2026-001"
                  invoiceDate: "2026-01-15T00:00:00Z"
                  paymentTermDays: 30
                  currencyCode: 1
                  invoiceItems:
                    - account: 4500
                      taxRate: 19
                      netAmount: 100.00
                      grossAmount: 119.00
                      vatAmount: 19.00
      responses:
        "200":
          description: Invoice created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /customers:
    post:
      operationId: createCustomer
      summary: Create Customer
      description: Creates a new customer in work4all.
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/CustomerInput"
                - required:
                    - firma1
            example:
              firma1: "Acme GmbH"
              eMail: "info@acme.de"
              telefon: "+49 30 123456"
              strasse: "Hauptstraße 1"
              plz: "10115"
              ort: "Berlin"
              interNet: "https://acme.de"
      responses:
        "200":
          description: Customer created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

    get:
      operationId: findCustomers
      summary: Find Customers
      description: Returns a paginated, name-sorted list of customers from work4all.
      tags:
        - Customers
      parameters:
        - in: query
          name: querySize
          schema:
            type: integer
            default: 100
          description: Number of results per page.
        - in: query
          name: queryPage
          schema:
            type: integer
            default: 1
          description: Page number (1-based).
        - in: query
          name: filter
          schema:
            type: string
          description: |
            Optional JSON filter array. Example: `[{"name":{"$eq":"Acme GmbH"}}]`
      responses:
        "200":
          description: Paginated list of customers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCustomers"

  /customers/{code}:
    get:
      operationId: findCustomer
      summary: Find Customer
      description: Finds a single customer by their internal work4all code.
      tags:
        - Customers
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: integer
          description: Internal work4all customer code.
          example: 123456789
      responses:
        "200":
          description: Customer found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: No customer found with the given code.

    put:
      operationId: updateCustomer
      summary: Update Customer
      description: |
        Updates an existing customer in work4all. Only the fields you provide are updated —
        leave a field empty to keep its existing value.
      tags:
        - Customers
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: integer
          description: Internal work4all customer code of the customer to update.
          example: 123456789
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
            example:
              notiz: "Updated via Zapier"
              eMail: "new@acme.de"
      responses:
        "200":
          description: Customer updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /projects:
    get:
      operationId: findProjects
      summary: Find Projects
      description: Returns a paginated, name-sorted list of projects from work4all.
      tags:
        - Projects
      parameters:
        - in: query
          name: querySize
          schema:
            type: integer
            default: 100
          description: Number of results per page.
        - in: query
          name: queryPage
          schema:
            type: integer
            default: 1
          description: Page number (1-based).
        - in: query
          name: filter
          schema:
            type: string
          description: |
            Optional JSON filter array. Example: `[{"name":{"$eq":"My Project"}}]`
      responses:
        "200":
          description: Paginated list of projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProjects"

  /projects/{code}:
    get:
      operationId: findProject
      summary: Find Project
      description: Finds a single project by its internal work4all code.
      tags:
        - Projects
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: integer
          description: Internal work4all project code.
          example: 1610906012
      responses:
        "200":
          description: Project found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: No project found with the given code.
